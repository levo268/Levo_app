name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Clean Environment
        run: |
          rm -rf android
          flutter clean
          flutter create --platforms=android .
          flutter pub get

      - name: Auto Post Error to GitHub Commit
        if: failure() || success()
        run: |
          flutter analyze > analyze_report.txt 2>&1 || true
          echo "### ❌ LEVO APP BUILD ERROR REPORT ❌" > comment.md
          echo "Bhai, tumhare code mein niche likhi jagah par dikkat hai, ise Acode mein theek karo:" >> comment.md
          echo '```text' >> comment.md
          grep -E "error •|line|Exception" analyze_report.txt >> comment.md || tail -n 30 analyze_report.txt >> comment.md
          echo '```' >> comment.md
          
          # Post comment to commit using GitHub CLI
          gh pr comment ${{ github.event.number }} --body-file=comment.md || gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments -F body=@comment.md || true

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: levo-premium-app
          path: build/app/outputs/flutter-apk/app-release.apk
