name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false
      - name: Force Fetch Dependencies
        run: flutter pub get
      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/v4/upload-artifact@v4
        with:
          name: levo-premium-app
          path: build/app/outputs/flutter-apk/app-release.apk
