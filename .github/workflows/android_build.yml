name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Reset Environment and Fix Packaging
        run: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub upgrade --major-versions
          flutter pub get

      - name: Force Build APK (Ignore Warnings)
        run: |
          export JAVA_OPTS="-Xmx4g -Dlint.nullness.ignore=true"
          flutter build apk --release --no-tree-shake-icons --no-sound-null-safety || flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: levo-premium-app
          path: build/app/outputs/flutter-apk/app-release.apk
