name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Reset Android Config
        run: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get

      - name: Build APK with Auto Error Log
        run: |
          flutter build apk --release --no-tree-shake-icons --verbose > build_failed.log 2>&1 || true
          if [ -d "build/app/outputs/flutter-apk" ]; then
            echo "Build Success!"
          else
            echo "=================== ASLI ERROR LOG NEECHE HAI ==================="
            cat build_failed.log | grep -E -A 10 "error:|Exception|failed:|Error" || cat build_failed.log | tail -n 100
            echo "================================================================"
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: levo-premium-app
          path: build/app/outputs/flutter-apk/app-release.apk
