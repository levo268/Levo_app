name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Clean Environment
        run: |
          rm -rf android
          flutter clean
          flutter create --platforms=android .
          flutter pub get

      - name: Catch Exact Dart Error
        run: |
          echo "=== DART CODE CHECKING START ==="
          flutter analyze > analyze.log 2>&1 || true
          cat analyze.log | grep -E "error •|line" || echo "No syntax errors found in analyze"
          echo "=== DART CODE CHECKING END ==="

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: levo-premium-app
          path: build/app/outputs/flutter-apk/app-release.apk
